<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lại Trung Hiếu - Tự Thực Hành 7</title>
  </head>
  <body>
    <table
      width="600"
      border="1"
      bordercolor="#cccccc"
      cellpadding="0"
      cellspacing="0"
    >
      <tr>
        <td>
          <table width="100%" cellpadding="15" cellspacing="0" border="0">
            <tr>
              <td bgcolor="#cb3514">
                <font
                  color="white"
                  face="Comic Sans MS, Arial, sans-serif"
                  size="5"
                  ><b>WUFOO</b></font
                >
              </td>
            </tr>
            <tr>
              <td bgcolor="#ffffff">
                <h2><font face="Arial, sans-serif">To Do List</font></h2>
                <hr size="1" color="#dddddd" />

                <form action="#" method="POST">
                  <font face="Arial, sans-serif" size="2"><b>Item</b></font
                  ><br />
                  <input type="text" name="item" size="78" /><br /><br />

                  <font face="Arial, sans-serif" size="2"
                    ><b>Description</b></font
                  ><br />
                  <textarea name="description" rows="6" cols="80"></textarea
                  ><br /><br />

                  <table
                    width="100%"
                    border="0"
                    cellpadding="0"
                    cellspacing="0"
                  >
                    <tr>
                      <td width="50%">
                        <font face="Arial, sans-serif" size="2"
                          ><b>Priority</b></font
                        >
                      </td>
                      <td width="50%">
                        <font face="Arial, sans-serif" size="2"
                          ><b>Category</b></font
                        >
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <select name="priority">
                          <option value="low">Low</option>
                          <option value="normal">Normal</option>
                          <option value="high">High</option>
                        </select>
                      </td>
                      <td>
                        <select name="category">
                          <option value="personal">Personal</option>
                          <option value="work">Work</option>
                          <option value="other">Other</option>
                        </select>
                      </td>
                    </tr>
                  </table>
                  <br />

                  <font face="Arial, sans-serif" size="2"><b>Due Date</b></font
                  ><br />
                  <table border="0" cellpadding="2" cellspacing="0">
                    <tr>
                      <td>
                        <input type="text" name="mm" size="2" maxlength="2" />
                      </td>
                      <td>/</td>
                      <td>
                        <input type="text" name="dd" size="2" maxlength="2" />
                      </td>
                      <td>/</td>
                      <td>
                        <input type="text" name="yyyy" size="4" maxlength="4" />
                      </td>
                      <td>📅</td>
                    </tr>
                    <tr>
                      <td align="center">
                        <font face="Arial, sans-serif" size="1" color="#888888"
                          >MM</font
                        >
                      </td>
                      <td></td>
                      <td align="center">
                        <font face="Arial, sans-serif" size="1" color="#888888"
                          >DD</font
                        >
                      </td>
                      <td></td>
                      <td align="center">
                        <font face="Arial, sans-serif" size="1" color="#888888"
                          >YYYY</font
                        >
                      </td>
                      <td></td>
                    </tr>
                  </table>
                  <br />

                  <font face="Arial, sans-serif" size="2"><b>Status</b></font
                  ><br />
                  <input type="checkbox" name="status" value="done" />
                  <font face="Arial, sans-serif" size="2">Done.</font
                  ><br /><br />

                  <input type="submit" value="Submit" />
                </form>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

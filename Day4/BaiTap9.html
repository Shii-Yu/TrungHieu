<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lại Trung Hiếu - Tự Thực Hành 9</title>
  </head>
  <body>
    <table
      width="600"
      bgcolor="#3b5998"
      cellpadding="10"
      cellspacing="0"
      border="0"
    >
      <tr>
        <td colspan="3" align="center">
          <font color="white" face="Tahoma, Arial" size="6"
            ><b>facebook</b></font
          >
        </td>
      </tr>
      <tr>
        <td colspan="3" bgcolor="#990000" height="1"></td>
      </tr>
      <tr>
        <td colspan="3" height="5"></td>
      </tr>
      <form action="#" method="POST">
        <tr>
          <td valign="top">
            <font color="white" face="Arial" size="2"
              >Email hoặc điện thoại</font
            ><br />
            <input type="text" name="email" size="25" /><br />
            <input type="checkbox" name="keep_login" checked />
            <font color="#9cb4d8" face="Arial" size="1">Duy trì đăng nhập</font>
          </td>
          <td valign="top">
            <font color="white" face="Arial" size="2">Mật khẩu</font><br />
            <input type="password" name="password" size="25" /><br />
            <a href="#"
              ><font color="#9cb4d8" face="Arial" size="1"
                >Quên mật khẩu?</font
              ></a
            >
          </td>
          <td valign="middle">
            <input type="submit" value="Đăng nhập" />
          </td>
        </tr>
      </form>
    </table>
  </body>
</html>

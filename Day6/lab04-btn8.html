<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài 8: Menu Chữ T</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 50px;
      }

      .nav {
        list-style: none;
        padding: 0;
        margin: 0;
        background-color: darkgreen;
        display: inline-flex;
      }

      .nav > li {
        position: relative;
      }

      .nav > li > a {
        display: block;
        padding: 15px 25px;
        color: white;
        text-decoration: none;
        font-size: 18px;
      }

      .nav > li > a.active {
        color: orange;
      }

      .dropdown {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        list-style: none;
        padding: 0;
        margin: 0;
        background-color: darkgreen;
        min-width: 200px;
      }

      .dropdown li a {
        display: block;
        padding: 12px 20px;
        color: white;
        text-decoration: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .nav > li:hover .dropdown {
        display: block;
      }

      .nav > li > a:hover {
        background-color: #004d00;
      }

      .dropdown li a:hover {
        background-color: #004d00;
      }
    </style>
  </head>
  <body>
    <p style="color: red">Bài 8</p>

    <ul class="nav">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li>
        <a href="#" class="active">Products</a>
        <ul class="dropdown">
          <li><a href="#">Engineering</a></li>
          <li><a href="#">Telecom</a></li>
          <li><a href="#">Energy</a></li>
          <li><a href="#">Finance</a></li>
          <li><a href="#">Consultancy</a></li>
        </ul>
      </li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </body>
</html>
